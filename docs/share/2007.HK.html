function listItems(items,mapper){return (items||[]).map(mapper).join('')||`<div class=empty>${d().empty}</div>`}
function renderDiff(){if(R.share_mode){diffPanel.style.display='none';return}diffPanel.style.display='block';if(!DF.has_previous){diffPanel.innerHTML=`<p class=eyebrow>${d().diff}</p><h2>${d().diff}</h2><div class=empty>${d().noPrevious}</div>`;return}let risks=listItems(DF.risk_changes,x=>`<div class=news-item><b>${e(x.ticker)} ${e(x.name)}</b><p class=muted>${e(x.from)} → ${e(x.to)}</p></div>`);let signals=listItems(DF.new_signals,x=>`<div class=news-item><b>${e(x.ticker)} ${e(x.name)}</b><p class=muted>${e(x.signal)}</p></div>`);let prices=listItems(DF.price_changes,x=>`<div class=news-item><b>${e(x.ticker)} ${e(x.name)}</b><p class="${cls(x.change_pct)}">${money(x.from,M.base_currency)} → ${money(x.to,M.base_currency)} · ${pct(x.change_pct)}</p></div>`);let news=listItems(DF.new_news,x=>`<div class=news-item><a href="${e(x.url||'#')}" target="_blank" rel="noreferrer">${e(x.ticker)} · ${e(x.title)}</a><p class=muted>${e(x.source)} · ${e(x.sentiment)}</p></div>`);diffPanel.innerHTML=`<p class=eyebrow>${d().diff}</p><h2>${d().diff}</h2><p class="small muted">${e(DF.previous_run_time||'')}</p><div class="grid cols2 section"><section><h3>${d().riskChanges}</h3>${risks}</section><section><h3>${d().newSignals}</h3>${signals}</section><section><h3>${d().priceChanges}</h3>${prices}</section><section><h3>${d().newNews}</h3>${news}</section></div>`}
function renderPortfolio(){if(R.share_mode){portfolio.style.display='none';return}portfolio.style.display='block';let actions=(R.priority_actions||[]).slice(0,6).map(a=>`<tr><td><b>${e(a.ticker)}</b><br><span class=muted>${e(a.name)}</span></td><td>${e(a.reason)}</td><td>${e(a.action)}</td><td>${riskTag(a.urgency||'watch')}</td></tr>`).join('')||`<tr><td colspan=4>${d().empty}</td></tr>`;let rows=visibleStocks().map(s=>{let pl=s.cost&&s.price?(s.price-s.cost)/s.cost*100:null;return `<tr><td><b>${e(s.ticker)}</b><br><span class=muted>${e(s.name)}</span></td><td>${e(s.market)}</td><td class=num>${money(s.price,s.currency||M.base_currency)}</td><td class="num ${cls(s.change_pct)}">${pct(s.change_pct)}</td><td>${riskTag(s.computed_risk_level)}</td></tr>`}).join('')||`<tr><td colspan=5>${d().empty}</td></tr>`;let alloc=Object.entries(M.market_allocation||{}).map(([k,v])=>`<span class=tag>${e(k)} ${pct(v)}</span>`).join('')||d().empty;let movers=(M.top_movers&&M.top_movers.length?M.top_movers:S.slice(0,6)),mx=Math.max(1,...movers.map(s=>Math.abs(Number(s.change_pct||0))));let bars=movers.map(s=>`<div title="${e(s.ticker)} ${pct(s.change_pct)}" class=bar style="height:${18+Math.abs(Number(s.change_pct||0))/mx*112}px;background:${Number(s.change_pct||0)>=0?'var(--up)':'var(--down)'}"></div>`).join('');portfolio.innerHTML=`<p class=eyebrow>${d().portfolio}</p><h2>${d().portfolio}</h2><div class="grid kpis"><div class=metric><b>${money(M.total_value,M.base_currency)}</b><span>${d().total}</span></div><div class=metric><b class="${cls(M.day_change_pct)}">${pct(M.day_change_pct)}</b><span>${d().daychg}</span></div><div class=metric><b>${M.risk_score??'N/A'}</b><span>${d().score}</span></div><div class=metric><b>${M.asset_count||S.length}</b><span>${d().count}</span></div></div><div class="grid cols2 section"><div><h3>${d().actions}</h3><table><tbody>${actions}</tbody></table></div><div><h3>${d().allocation}</h3><p>${alloc}</p><div class=bars>${bars}</div></div></div><div class=section><h3>${d().assets}</h3><table><thead><tr><th>Ticker</th><th>Market</th><th class=num>${d().current}</th><th class=num>${d().change}</th><th>${d().risk}</th></tr></thead><tbody>${rows}</tbody></table></div>`}
function stockReport(s){let news=(s.news||[]).slice(0,5).map(n=>`<div class=news-item><a href="${e(n.url||'#')}" target="_blank" rel="noreferrer">${e(n.title)}</a><p class="small muted">${e(n.source)} · ${e(n.sentiment)} · ${e(n.published_at)}</p></div>`).join('')||`<div class=empty>${d().empty}</div>`;let sig=(s.signals||s.risk_signals||[]).map(x=>`<span class=tag>${e(x)}</span>`).join('')||`<span class=muted>${d().empty}</span>`;let riskText=(s.risk_signals||[]).join(' · ');let ind=s.indicators||{};return `<article class="paper report" id="stock-${slug(s.ticker)}"><div class=report-head><div><p class=eyebrow>${d().single}</p><h2>${e(s.name)} ${e(s.ticker)}</h2><p class=muted>${e(s.market)} · ${e(s.source||'yfinance / akshare')} · ${e(s.type||'watchlist')}</p></div><div class=price><b>${money(s.price,s.currency||M.base_currency)}</b><span class="${cls(s.change_pct)}">${pct(s.change_pct)}</span></div></div><div class="grid cols2"><section><h3>${d().thesis}</h3><p class=quote>${e(s.ai_commentary||s.suggested_action||R.overall_status||d().empty)}</p><p>${sig}</p></section><section><h3>${d().risk}</h3><p>${riskTag(s.computed_risk_level||s.risk_level)} <span class=tag>${e(s.suggested_action||'watch')}</span></p><p class=muted>${e(riskText)}</p></section></div><div class="grid cols3 section"><div class=metric><b>${money(s.cost,s.currency||M.base_currency)}</b><span>${d().cost}</span></div><div class=metric><b class="${cls(s.change_pct)}">${pct(s.change_pct)}</b><span>${d().change}</span></div><div class=metric><b>${pct(s.indicators?.change_5d_pct)}</b><span>5D</span></div></div><div class="grid cols2 section"><section><h3>${d().tech}</h3><table><tbody><tr><th>MA5</th><td>${n(ind.ma5)}</td></tr><tr><th>MA20</th><td>${n(ind.ma20)}</td></tr><tr><th>MA60</th><td>${n(ind.ma60)}</td></tr><tr><th>RSI</th><td>${n(ind.rsi)}</td></tr></tbody></table></section><section><h3>${d().news}</h3><div class=news>${news}</div></section></div><div class=section><h3>${d().sources}</h3><p class="small muted">yfinance / akshare · Google Sheet · Bing News / Google News RSS</p></div></article>`}
function renderReports(){reports.innerHTML=visibleStocks().map(stockReport).join('')||`<div class=empty>${d().empty}</div>`}
function renderFeed(){let items=visibleStocks().flatMap(s=>(s.news||[]).map(n=>({...n,ticker:s.ticker}))).slice(0,18);newsFeed.innerHTML=`<p class=eyebrow>${d().news}</p><h2>${d().news}</h2><div class=news>${items.map(n=>`<div class=news-item><a href="${e(n.url||'#')}" target=_blank rel=noreferrer>${e(n.ticker)} · ${e(n.title)}</a><p class="small muted">${e(n.source)} · ${e(n.sentiment)} · ${e(n.published_at)}</p></div>`).join('')||`<div class=empty>${d().empty}</div>`}</div>`}
function appBase(){return location.pathname.includes('/share/')||location.pathname.includes('/private/')?'../':'./'}
function setupPwa(){manifestLink.href=appBase()+'manifest.webmanifest';if('serviceWorker' in navigator && location.protocol.startsWith('http')){navigator.serviceWorker.register(appBase()+'sw.js').catch(()=>undefined)}}
function render(){renderCover();renderToc();renderStatus();renderDiff();renderPortfolio();renderReports();renderFeed();setupPwa()}
langZh.onclick=()=>{L='zh';render()};langEn.onclick=()=>{L='en';render()};themeToggle.onclick=()=>{T=T==='dark'?'light':'dark';render()};q.oninput=ev=>{filter=ev.target.value;renderToc();renderPortfolio();renderReports();renderFeed()};render();
</script>
</body>
</html>
