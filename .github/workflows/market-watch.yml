name: Market Watch

on:
  push:
    branches:
      - main
  schedule:
    - cron: "30 2 * * 1-5"
    - cron: "45 5 * * 1-5"
    - cron: "0 6 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  run-market-watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run market watch
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BING_SEARCH_API_KEY: ${{ secrets.BING_SEARCH_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID || '1OFPZuAMQTqOOuSGvAgu9NkF23t3aQsY-Z7OWaPwYAEc' }}
          GOOGLE_SHEET_GID: ${{ secrets.GOOGLE_SHEET_GID || '0' }}
          REPORT_BASE_URL: ${{ vars.REPORT_BASE_URL || format('https://{0}.github.io/{1}', github.repository_owner, github.event.repository.name) }}
        run: python src/main.py --all --html --json
      - name: Commit generated Pages report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f docs/index.html docs/latest_report.html docs/reports docs/.nojekyll
          git commit -m "Update generated market report" || echo "No report changes"
          git push
